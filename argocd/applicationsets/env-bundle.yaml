# Replace repoURL with the Git remote Argo CD can reach before applying this ApplicationSet.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: env-bundle
  namespace: sample-applicationset
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - name: keda-operator
            repoURL: https://github.com/tkeshun/keda-kind.git
            targetRevision: HEAD
            chartPath: manifest/keda-operator
            valuesFile: values/develop.yaml
            releaseName: keda
            serverSideApply: 'true'
            destinationServer: https://kubernetes.default.svc
            destinationNamespace: keda
          - name: infra-core
            repoURL: https://github.com/tkeshun/keda-kind.git
            targetRevision: HEAD
            chartPath: manifest/infra-bundle
            valuesFile: values/develop.yaml
            releaseName: infra-core
            serverSideApply: 'false'
            destinationServer: https://kubernetes.default.svc
            destinationNamespace: default
          - name: enqueue-app
            repoURL: https://github.com/tkeshun/keda-kind.git
            targetRevision: HEAD
            chartPath: manifest/enqueue-app
            valuesFile: values/develop.yaml
            releaseName: enqueue-app
            serverSideApply: 'false'
            destinationServer: https://kubernetes.default.svc
            destinationNamespace: default
          - name: dequeue-app
            repoURL: https://github.com/tkeshun/keda-kind.git
            targetRevision: HEAD
            chartPath: manifest/dequeue-app
            valuesFile: values/develop.yaml
            releaseName: dequeue-app
            serverSideApply: 'false'
            destinationServer: https://kubernetes.default.svc
            destinationNamespace: default
  template:
    metadata:
      name: "{{ .name }}"
      namespace: sample-applicationset
      labels:
        app.kubernetes.io/managed-by: applicationset
        app.kubernetes.io/part-of: keda-kind
    spec:
      project: sample-app
      source:
        repoURL: "{{ .repoURL }}"
        targetRevision: "{{ .targetRevision }}"
        path: "{{ .chartPath }}"
        helm:
          releaseName: "{{ .releaseName }}"
          valueFiles:
            - "{{ .valuesFile }}"
      destination:
        server: "{{ .destinationServer }}"
        namespace: "{{ .destinationNamespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply={{ .serverSideApply }}
